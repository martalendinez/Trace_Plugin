<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Plugin UI</title>

    <link rel="stylesheet" href="./dist/index.css" />

    <script>
      console.log("🔥 UI HTML LOADED");
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- IMPORTANT: load JS directly, no assets/ folder -->
    <script>
      console.log("🚀 loading bundle");

      const script = document.createElement("script");
      script.src = "./dist/index.js";

      script.onload = () => console.log("✅ bundle loaded");
      script.onerror = () => console.error("❌ bundle failed");

      document.body.appendChild(script);
    </script>
  </body>
</html>
